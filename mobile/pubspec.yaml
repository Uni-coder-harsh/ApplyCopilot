name: applycopilot
description: Local-first AI job & internship tracker
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.4.3+1

  # Local storage
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Utilities
  intl: any
  url_launcher: ^6.3.0
  flutter_localizations:

    sdk: flutter
  go_router: ^17.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  generate: true